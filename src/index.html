<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="output.css">
    <title>Calculator</title>
</head>

<body class=" min-h-screen flex items-center justify-center bg-linear-to-br from-gray-200 via-blue-400 to-red-300 ">

   <div id=" Calculator" class=" bg-white p-7 w-100 h-125 rounded-3xl ">
    <div id=" input" class="mt-4 mb-6">
        <input id="display" class=" bg-gray-200 hover:bg-gray-300 focus:bg-gray-300  text-4xl p-2 rounded-xl text-right  overflow-hidden wrap-break-word min-h-20 flex items-center justify-end w-full " readonly>
    </div>
     <div class="grid grid-cols-4 gap-3">
        <button onclick="cleardisplay()" class="rounded-lg p-3 text-white bg-red-500 text-2xl hover:bg-red-600 " >C</button>
        <button onclick="deletelast()" class="bg-indigo-500 rounded-lg p-3 text-white text-2xl hover:bg-indigo-600 " >⌫</button>
        <button onclick="appendvalue('%')" class="bg-indigo-500 rounded-lg p-3 text-white text-2xl hover:bg-indigo-600" >%</button>
        <button onclick="appendvalue('/')" class="bg-indigo-500 rounded-lg p-3 text-white text-2xl hover:bg-indigo-600" >/</button>

        <button onclick="appendvalue('9')" class="btn text-xl">9</button>
        <button onclick="appendvalue('8')" class="btn text-xl">8</button>
        <button onclick="appendvalue('7')" class="btn text-xl">7</button>
        <button onclick="appendvalue('*')" class="bg-blue-400 rounded-lg p-3 text-white text-2xl hover:bg-blue-500">x</button>
        
        <button onclick="appendvalue('6')" class="btn text-xl">6</button>
        <button onclick="appendvalue('5')" class="btn text-xl">5</button>
        <button onclick="appendvalue('4')" class="btn text-xl">4</button>
        <button onclick="appendvalue('+')" class="bg-blue-400 rounded-lg p-3 text-white text-2xl hover:bg-blue-500">+</button>
        
        <button onclick="appendvalue('3')" class="btn text-xl">3</button>
        <button onclick="appendvalue('2')" class="btn text-xl">2</button>
        <button onclick="appendvalue('1')" class="btn text-xl">1</button>
        <button onclick="appendvalue('-')" class="bg-blue-400 rounded-lg p-3 text-white text-2xl hover:bg-blue-500">-</button>
        
        <button onclick="appendvalue('0')" class="btn col-span-2 text-xl">0</button>
        <button onclick="appendvalue('.')" class="btn text-xl">.</button>
        <button onclick="calculate('=')" class="rounded-lg p-3 text-white text-2xl bg-green-400 hover:bg-green-500">=</button>

     </div>
   </div>

   <script src="index.js"></script>

</body>
</html>
